host: 0.0.0.0
port: 8000
db_path: /data/scanner.db
api_key: test123
claude_api_key: ''
slack_webhook_url: ''
email_smtp_host: ''
log_level: info
scan_timeout: 600
notifications:
  slack:
    enabled: true
gate:
  fail_on:
  - high
ai:
  max_cost_per_scan: 1.0
  min_severity: high
scanners:
  semgrep:
    adapter_class: scanner.adapters.semgrep.SemgrepAdapter
    enabled: true
    timeout: 180
    extra_args:
    - --exclude
    - .venv
    - --exclude
    - node_modules
    languages:
    - python
    - php
    - javascript
    - typescript
    - go
    - java
    - kotlin
    - ruby
    - csharp
    - rust
  cppcheck:
    adapter_class: scanner.adapters.cppcheck.CppcheckAdapter
    enabled: true
    timeout: 120
    extra_args:
    - -i.venv
    - -inode_modules
    languages:
    - cpp
  gitleaks:
    adapter_class: scanner.adapters.gitleaks.GitleaksAdapter
    enabled: true
    timeout: 120
    extra_args: []
    languages: []
  trivy:
    adapter_class: scanner.adapters.trivy.TrivyAdapter
    enabled: true
    timeout: 240
    extra_args: []
    languages:
    - docker
    - terraform
    - yaml
  checkov:
    adapter_class: scanner.adapters.checkov.CheckovAdapter
    enabled: true
    timeout: 240
    extra_args:
    - --skip-path
    - .venv
    - --skip-path
    - node_modules
    languages:
    - docker
    - terraform
    - yaml
    - ci
  psalm:
    adapter_class: scanner.adapters.psalm.PsalmAdapter
    enabled: auto
    timeout: 300
    extra_args: []
    languages:
    - php
  enlightn:
    adapter_class: scanner.adapters.enlightn.EnlightnAdapter
    enabled: auto
    timeout: 240
    extra_args: []
    languages:
    - laravel
  php_security_checker:
    adapter_class: scanner.adapters.php_security_checker.PhpSecurityCheckerAdapter
    enabled: auto
    timeout: 30
    extra_args: []
    languages:
    - php
  gosec:
    adapter_class: scanner.adapters.gosec.GosecAdapter
    enabled: auto
    timeout: 120
    extra_args: []
    languages:
    - go
  bandit:
    adapter_class: scanner.adapters.bandit.BanditAdapter
    enabled: auto
    timeout: 120
    extra_args: []
    languages:
    - python
  brakeman:
    adapter_class: scanner.adapters.brakeman.BrakemanAdapter
    enabled: auto
    timeout: 120
    extra_args: []
    languages:
    - ruby
  cargo_audit:
    adapter_class: scanner.adapters.cargo_audit.CargoAuditAdapter
    enabled: auto
    timeout: 60
    extra_args: []
    languages:
    - rust
  nuclei:
    adapter_class: scanner.adapters.nuclei.NucleiAdapter
    enabled: true
    timeout: 300
    extra_args: []
    languages: []
profiles:
  Deep_Audit:
    description: Full scan
    scanners:
      semgrep: {}
      cppcheck: {}
      gitleaks: {}
      trivy: {}
      checkov: {}
      psalm: {}
      enlightn: {}
      php_security_checker: {}
      gosec: {}
      bandit: {}
      brakeman: {}
      cargo_audit: {}
      nuclei: {}
