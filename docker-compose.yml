services:
  scanner:
    build: .
    ports:
      - "${SCANNER_PORT:-8000}:8000"
    volumes:
      - scanner_data:/data
      - ./config.yml:/app/config.yml
      - /home:/home:ro  # Mount host /home for local path scanning
    environment:
      - SCANNER_ADMIN_USER=${SCANNER_ADMIN_USER:-}
      - SCANNER_ADMIN_PASSWORD=${SCANNER_ADMIN_PASSWORD:-}
      - SCANNER_DB_PATH=/data/scanner.db
      - SCANNER_API_KEY=${SCANNER_API_KEY:-}
      - SCANNER_CLAUDE_API_KEY=${SCANNER_CLAUDE_API_KEY:-}
      - SCANNER_SLACK_WEBHOOK_URL=${SCANNER_SLACK_WEBHOOK_URL:-}
      - SCANNER_EMAIL_SMTP_HOST=${SCANNER_EMAIL_SMTP_HOST:-}
      - SCANNER_GIT_TOKEN=${SCANNER_GIT_TOKEN:-}
      - SCANNER_CONFIG_PATH=/app/config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  scanner_data:
